<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Patient - Medical Assistant Robot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Medical Assistant Robot</h1>
            <p>Hospital Management System</p>
            <button id="dark-mode-toggle">Dark Mode</button>
        </header>
        <h2>Register Patient</h2>
        <form method="POST">
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" required>
            <label for="room">Room Number:</label>
            <input type="text" id="room" name="room" required>
            <label for="age">Age:</label>
            <input type="number" id="age" name="age" required>
            <label for="gender">Gender:</label>
            <select id="gender" name="gender">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
            <label for="contact">Contact:</label>
            <input type="text" id="contact" name="contact" required>
            <label for="medicine">Medicine:</label>
            <input type="text" id="medicine" name="medicine" required>
            <label for="dosage">Dosage:</label>
            <input type="text" id="dosage" name="dosage" required>
            <label for="schedule">Schedule (comma-separated times, e.g., 08:00,12:00,18:00):</label>
            <input type="text" id="schedule" name="schedule" required>
            <button type="submit">Register</button>
        </form>
        <a href="{{ url_for('dashboard') }}">Back to Dashboard</a>
    </div>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
